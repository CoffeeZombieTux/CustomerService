spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHk=
app.jwt.expiration-ms=900000
app.activation.button-url=http://localhost/activate
app.activation.success-url=http://localhost/success
app.activation.fail-url=http://localhost/fail
app.activation.token-liveness-hours=24
app.security.max-sessions=5
app.security.refresh-token-liveness-days=7
app.security.idempotency-key-hours=24
app.internal.api-key=test-api-key
app.agreements.mandatory=TERMS_OF_SERVICE,PRIVACY_POLICY,LOYALTY_PROGRAM_TERMS
app.messages.registration-success=Registration successful
app.messages.resend-activation=Activation link sent
app.cleanup.refresh-token.batch=1000

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
